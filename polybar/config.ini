[colors]
background = #1d2021
background-alt = #282828
foreground = #ebdbb2
primary = #F0C674
secondary = #83a598
alert = #cc241d
disabled = #a89984

col_orange_200 = #d65d0e
col_orange_100 = #fe8019
col_yellow_100 = #fabd2f
col_yellow_200 = #d79921
col_gray_10 = #fbf1c7
col_gray_20 = #ebdbb2
col_gray_30 = #bdae93
col_gray_40 = #a89984
col_gray_200 = #3c3836
col_gray_300 = #282828
col_gray_400 = #1d2021
col_red_200 = #cc241d
col_red_100 = #fb4934
col_blue_300 = #458588
col_blue_200 = #83a598
col_aqua_300 = #689d6a
col_aqua_200 = #8ec07c
col_green_100 = #b8bb26
col_green_200 = #98971a
col_purple_100 = #d3869b
col_purple_200 = #b16286


[bar/example]
width = 100%
height = 26px
radius = 5

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2

border-size = 4px
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 4px

separator = ¬∑  
separator-foreground = ${colors.disabled}

font-0 = caskaydiacovenerdfont;2

modules-left = xworkspaces
modules-center = polywins
modules-right = pulseaudio backlight battery wlan eth date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "ůįēĺ "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = "ůįĖĀ"
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ůįėö "
format-prefix-foreground = ${colors.primary}
label = %used:2%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôíľ "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = "%{F#F0C674}ůįĖ©"  
label-disconnected = "%{F-}ůįĖ™"   

[module/eth]
inherit = network-base
interface-type = wired
label-connected = "%{F#F0C674}ůįąÄ" 
label-disconnected = "%{F-}ůįąā"   
[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true
; vim:ft=dosini

[module/battery]
type = internal/battery

; This is useful in case the battery never reports 100% charge
; Default: 100
full-at = 99

; format-low once this charge percentage is reached
; Default: 10
; New in version 3.6.0
low-at = 10

; Use the following command to list batteries and adapters:
; $ ls -1 /sys/class/power_supply/
battery = CMB1
adapter = ADP1

; If an inotify event haven't been reported in this many
; seconds, manually poll for new values.
;
; Needed as a fallback for systems that don't report events
; on sysfs/procfs.
;
; Disable polling by setting the interval to 0.
;
; Default: 5
poll-interval = 5

format-charging = %{F#F0C674}ůįāĄ %{F-}<label-charging>
format-discharging = %{F#F0C674}<ramp-capacity> %{F-}<label-discharging>  

label-charging = %percentage%%
label-discharging = %percentage%%

label-full = %{F#83a598}ůĪüĘ Full
label-low = %{F#cc241d}ůįāÉ Low

ramp-capacity-0 = ůįĀļ
ramp-capacity-1 = ůįĀľ
ramp-capacity-2 = ůįĀĺ
ramp-capacity-3 = ůįāÄ
ramp-capacity-4 = ůįāĀ

[module/backlight]
type = internal/backlight

; Use the following command to list available cards:
; $ ls -1 /sys/class/backlight/
card = intel_backlight

; Use the `/sys/class/backlight/.../actual-brightness` file
; rather than the regular `brightness` file.
; Defaults to true unless the specified card is an amdgpu backlight.
; New in version 3.6.0
use-actual-brightness = true

; Enable changing the backlight with the scroll wheel
; NOTE: This may require additional configuration on some systems. Polybar will
; write to `/sys/class/backlight/${self.card}/brightness` which requires polybar
; to have write access to that file.
; DO NOT RUN POLYBAR AS ROOT. 
; The recommended way is to add the user to the
; `video` group and give that group write-privileges for the `brightness` file.
; See the ArchWiki for more information:
; https://wiki.archlinux.org/index.php/Backlight#ACPI
; Default: false
enable-scroll = true

format = %{F#F0C674}<ramp> %{F-}<label>

label = %percentage%%

ramp-0 = Óéć
ramp-1 = ÓŹí
ramp-2 = ÓŹé
ramp-3 = ÓŹĆ
ramp-4 = Óéõ

[module/indicators]
type = custom/script
exec = python3 ~/.config/polybar/polybar-status-indicators/host.py 2> /dev/null
tail = true

[module/polywins]
type = custom/script
exec = ~/.config/polybar/scripts/polywins/polywins.sh 2>/dev/null
format = <label>
label = %output%
label-padding = 1
tail = true

